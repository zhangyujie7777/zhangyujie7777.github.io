<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>张玉杰 Design Portfolio</title>
    <meta
      name="description"
      content="张玉杰个人设计作品集，包含个人信息、设计作品、更多项目入口与联系入口。"
    />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./assets/css/styles.css?v=20260619-home-header-fix-6" />
  </head>
  <body class="home-body">
    <main class="portfolio-home">
      <header class="hero-header" aria-label="首页导航">
        <div class="brand-banner" aria-label="Welcome">
          <div class="brand-stage">
            <img src="./assets/home/brand-welcome-blank.png" alt="" />
            <span class="welcome-type" data-typewriter="WELCOME">WELCOME</span>
          </div>
        </div>

        <div class="toolbar">
          <div class="location-chip" aria-label="目标区域">
            <img src="./assets/home/location-temple.png" alt="" />
            <span>Base Beijing</span>
          </div>

          <nav class="action-nav" aria-label="快捷操作">
            <a
              class="icon-button"
              href="./assets/resume.pdf"
              download
              data-toast="PDF下载"
              data-tooltip="下载PDF简历"
              aria-label="下载PDF简历"
            >
              <img src="./assets/home/icon-download.png" alt="" />
            </a>
            <button
              class="icon-button"
              type="button"
              data-action="share"
              data-tooltip="分享给其他人"
              aria-label="分享给其他人"
            >
              <img src="./assets/home/icon-share.png" alt="" />
            </button>
            <button
              class="icon-button"
              type="button"
              data-action="like"
              data-tooltip="为设计师点赞"
              aria-label="为设计师点赞"
            >
              <img
                src="./assets/home/icon-like.png"
                data-icon-default="./assets/home/icon-like.png"
                data-icon-liked="./assets/home/icon-like-liked.png"
                alt=""
              />
            </button>
          </nav>
        </div>
      </header>

      <section class="main-grid" aria-label="作品集首页内容">
        <aside class="profile-panel" id="profile" aria-label="个人信息">
          <div class="section-title">
            <img class="title-icon" src="./assets/home/title-question.png" alt="" />
            <h1>Profile</h1>
          </div>

          <img class="profile-avatar" src="./assets/home/avatar.png" alt="张玉杰头像" />

          <div class="profile-copy">
            <h2>张玉杰</h2>
            <p class="role">UI+视觉设计师</p>
            <p>注重产品体验，视觉表达与复杂业务场景的设计落地。</p>
            <div class="tag-row">
              <span>UI</span>
              <span>3D</span>
              <span>动效</span>
            </div>
          </div>

          <div class="profile-block education-block">
            <h3>Education</h3>
            <p>2017年毕业于海南大学<br />广告学专业，统招本科。</p>
            <div class="tag-row soft">
              <span>211</span>
              <span>双一流</span>
            </div>
          </div>

          <div class="profile-block experience-block">
            <h3>Experience</h3>
            <p>京东零售/字节跳动/百度（广州）</p>
            <div class="tag-row warm">
              <span>互联网</span>
              <span>UED</span>
              <span>c端APP</span>
            </div>
          </div>

          <button class="contact-trigger" id="contact" type="button" data-action="contact">
            <img src="./assets/home/contact-button.png?v=20260618-2" alt="WeChat" />
          </button>
        </aside>

        <section class="works-panel" id="works" aria-label="设计作品">
          <div class="section-title">
            <img class="title-icon" src="./assets/home/title-question.png" alt="" />
            <h2>Design Works</h2>
          </div>

          <div class="vinyl-grid">
            <a class="vinyl-card" href="./projects/work-myjd.html">
              <img class="vinyl-image" src="./assets/home/vinyl-01.png" alt="" />
              <strong>在京东-我京作品</strong>
              <img class="card-arrow" src="./assets/home/arrow-dot.png" alt="" />
            </a>
            <a class="vinyl-card" href="./projects/work-transaction.html">
              <img class="vinyl-image" src="./assets/home/vinyl-02.png" alt="" />
              <strong>在京东-交易链路</strong>
              <img class="card-arrow" src="./assets/home/arrow-dot.png" alt="" />
            </a>
            <a class="vinyl-card" href="./projects/work-jd.html">
              <img class="vinyl-image" src="./assets/home/vinyl-03.png" alt="" />
              <strong>在京东-首页作品</strong>
              <img class="card-arrow" src="./assets/home/arrow-dot.png" alt="" />
            </a>
            <a class="vinyl-card" href="./projects/work-bytedance.html">
              <img class="vinyl-image" src="./assets/home/vinyl-04.png" alt="" />
              <strong>在字节-幸福里作品</strong>
              <img class="card-arrow" src="./assets/home/arrow-dot.png" alt="" />
            </a>
            <a class="vinyl-card" href="./projects/work-selfmedia.html">
              <img class="vinyl-image" src="./assets/home/vinyl-05.png" alt="" />
              <strong>自媒体探索</strong>
              <img class="card-arrow" src="./assets/home/arrow-dot.png" alt="" />
            </a>
            <a class="vinyl-card" href="./projects/work-ai-tools.html">
              <img class="vinyl-image" src="./assets/home/vinyl-06.png" alt="" />
              <strong>AI工具使用</strong>
              <img class="card-arrow" src="./assets/home/arrow-dot.png" alt="" />
            </a>
          </div>
        </section>

        <section class="more-panel" id="more-works" aria-label="更多作品">
          <div class="section-title">
            <img class="title-icon" src="./assets/home/title-question.png" alt="" />
            <h2><span class="more-title-emphasis">More</span> Works</h2>
          </div>

          <div class="more-grid">
            <a class="more-card" href="./projects/more-2020-bill.html">
              <img src="./assets/home/more-new-01.png" alt="2020 京东年度账单" />
            </a>
            <a class="more-card" href="./projects/more-app-13.html">
              <img src="./assets/home/more-new-02.png" alt="APP 13.0" />
            </a>
            <a class="more-card" href="./projects/more-3d-library.html">
              <img src="./assets/home/more-new-03.png" alt="3D 组件库" />
            </a>
            <a class="more-card" href="./projects/more-widgets.html">
              <img src="./assets/home/more-new-04.png" alt="Widgets" />
            </a>
          </div>

      <footer class="site-footer" aria-label="底部信息">
        <img src="./assets/home/footer-left.png?v=20260618-2" alt="Design By Yujie Zhang" />
        <img src="./assets/home/footer-right.png?v=20260618-2" alt="Designed In Figma Built With Codex" />
      </footer>

    <div class="toast" role="status" aria-live="polite"></div>

    <div class="modal" aria-hidden="true">
      <div class="modal-backdrop" data-action="close-modal"></div>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-label="Contact Me">
        <img class="modal-sheet" src="./assets/home/contact-modal.png" alt="Contact Me 弹窗内容" />
        <button class="modal-close" type="button" data-action="close-modal" aria-label="关闭弹窗">
          <img src="./assets/home/modal-close.png" alt="" />
        </button>
      </section>
    </div>

    <script src="./assets/js/script.js?v=20260619-home-restore"></script>
