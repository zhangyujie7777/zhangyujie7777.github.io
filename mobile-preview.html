<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>张玉杰作品集 · 移动端预览</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { min-height: 100%; margin: 0; }
      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        padding: 28px;
        place-items: center;
        background: #252525;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      }
      .preview-device {
        width: 390px;
        max-width: 100%;
        height: 844px;
        max-height: calc(100vh - 56px);
        overflow: hidden;
        border: 1px solid #4a4a4a;
        border-radius: 24px;
        background: #000;
        box-shadow: 0 20px 64px rgba(0, 0, 0, 0.46);
      }
      .preview-device iframe {
        display: block;
        width: 390px;
        height: 844px;
        max-width: none;
        border: 0;
        background: #000;
      }
      @media (max-width: 480px) {
        body { padding: 0; }
        .preview-device {
          width: 100vw;
          height: 100vh;
          max-height: none;
          border: 0;
          border-radius: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="preview-device" aria-label="390 像素移动端预览">
      <iframe src="./index.html?preview=embedded" title="张玉杰作品集移动端首页" loading="eager"></iframe>
    </main>
  </body>
</html>
